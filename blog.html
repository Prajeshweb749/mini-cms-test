<!DOCTYPE html>
<html>
<head>
  <title>Blog</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <section class="hero">
    <h1>Insights & Articles</h1>
    <p>Helping parents build confident and expressive children</p>
  </section>

  <section class="blog-container">
    <div id="posts"></div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <script>
    const username = "Prajeshweb749";
    const repo = "mini-cms-test";

    async function fetchPosts() {
      const response = await fetch(`https://api.github.com/repos/${username}/${repo}/contents/content/blog`);
      const files = await response.json();

      const postsContainer = document.getElementById("posts");

      for (let file of files.reverse()) {
        if (file.name.endsWith(".md")) {
          const raw = await fetch(file.download_url);
          const markdown = await raw.text();
          const html = marked.parse(markdown);

          const div = document.createElement("div");
          div.classList.add("blog-card");
          div.innerHTML = html;

          postsContainer.appendChild(div);
        }
      }
    }

    fetchPosts();
  </script>

</body>
</html>
